<!DOCTYPE html>
<html>
<head>
    <title>My First Website</title>

    <style>
        body{
            background-color: #f5f5f5;
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
        }

        h1{
            color: darkblue;
        }

        p{
            font-size: 20px;
        }

        button{
            padding: 10px 20px;
            border: none;
            background-color: blue;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background-color: darkblue;
        }
    </style>
</head>

<body>

    <h1>Hello World 🌍</h1>

    <p>My website is connected to GitHub and Vercel.</p>

    <button onclick="showMessage()">
        Click Me
    </button>

    <script>
        function showMessage(){
            alert("Welcome to my website!");
        }
    </script>

</body>
</html>

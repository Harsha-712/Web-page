<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AI Dream Generator</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;
            overflow-x:hidden;
            background:linear-gradient(135deg,#050816,#12082b,#1f1147);
            color:white;
            position:relative;
        }

        /* Animated Background */

        .background{
            position:fixed;
            width:100%;
            height:100%;
            overflow:hidden;
            z-index:-1;
        }

        .circle{
            position:absolute;
            border-radius:50%;
            filter:blur(10px);
            opacity:0.5;
            animation:float 10s infinite ease-in-out;
        }

        .circle:nth-child(1){
            width:250px;
            height:250px;
            background:#8b5cf6;
            top:10%;
            left:5%;
        }

        .circle:nth-child(2){
            width:300px;
            height:300px;
            background:#ec4899;
            top:50%;
            right:10%;
            animation-delay:2s;
        }

        .circle:nth-child(3){
            width:180px;
            height:180px;
            background:#3b82f6;
            bottom:5%;
            left:40%;
            animation-delay:4s;
        }

        @keyframes float{
            0%{
                transform:translateY(0px);
            }
            50%{
                transform:translateY(-30px);
            }
            100%{
                transform:translateY(0px);
            }
        }

        /* Navbar */

        nav{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:25px 10%;
        }

        .logo{
            font-size:28px;
            font-weight:700;
            color:#ffffff;
        }

        .logo span{
            color:#c084fc;
        }

        .nav-links{
            display:flex;
            gap:30px;
        }

        .nav-links a{
            color:white;
            text-decoration:none;
            transition:0.3s;
        }

        .nav-links a:hover{
            color:#c084fc;
        }

        /* Hero Section */

        .hero{
            min-height:90vh;
            display:flex;
            justify-content:center;
            align-items:center;
            text-align:center;
            padding:20px;
        }

        .hero-content{
            max-width:850px;
        }

        .hero h1{
            font-size:70px;
            line-height:1.1;
            margin-bottom:20px;
        }

        .hero h1 span{
    background:linear-gradient(to right,#c084fc,#ec4899,#60a5fa);

    -webkit-background-clip:text;
    background-clip:text;

    -webkit-text-fill-color:transparent;
}

        .hero p{
            font-size:20px;
            color:#d1d5db;
            margin-bottom:40px;
            line-height:1.7;
        }

        /* Input Box */

        .dream-box{
            background:rgba(255,255,255,0.08);
            border:1px solid rgba(255,255,255,0.15);
            backdrop-filter:blur(15px);
            border-radius:25px;
            padding:30px;
            box-shadow:0 0 30px rgba(0,0,0,0.3);
        }

        textarea{
            width:100%;
            height:140px;
            border:none;
            outline:none;
            resize:none;
            border-radius:18px;
            padding:20px;
            font-size:18px;
            background:rgba(255,255,255,0.1);
            color:white;
            margin-bottom:25px;
        }

        textarea::placeholder{
            color:#d1d5db;
        }

        button{
            padding:15px 40px;
            border:none;
            border-radius:50px;
            background:linear-gradient(to right,#8b5cf6,#ec4899);
            color:white;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;
            font-weight:600;
        }

        button:hover{
            transform:scale(1.05);
            box-shadow:0 0 20px #c084fc;
        }

        /* Dream Output */

        .output{
            margin-top:40px;
            display:none;
            animation:fadeIn 1s ease;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(20px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        .dream-card{
            margin-top:20px;
            background:rgba(255,255,255,0.08);
            border:1px solid rgba(255,255,255,0.1);
            border-radius:20px;
            padding:30px;
            backdrop-filter:blur(12px);
            line-height:1.8;
            color:#f3f4f6;
            box-shadow:0 0 20px rgba(255,255,255,0.05);
        }

        /* Mood Section */

        .moods{
            margin-top:60px;
            display:flex;
            justify-content:center;
            gap:20px;
            flex-wrap:wrap;
        }

        .mood-btn{
            padding:12px 25px;
            border-radius:40px;
            background:rgba(255,255,255,0.08);
            border:1px solid rgba(255,255,255,0.1);
            cursor:pointer;
            transition:0.3s;
        }

        .mood-btn:hover{
            background:#8b5cf6;
            transform:translateY(-5px);
        }

        /* Footer */

        footer{
            text-align:center;
            padding:40px 20px;
            color:#d1d5db;
        }

        /* Responsive */

        @media(max-width:768px){

            .hero h1{
                font-size:45px;
            }

            .hero p{
                font-size:17px;
            }

            nav{
                flex-direction:column;
                gap:20px;
            }

            .nav-links{
                gap:15px;
            }

        }

    </style>
</head>

<body>

    <!-- Background -->

    <div class="background">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>

    <!-- Navbar -->

    <nav>
        <div class="logo">
            Dream<span>AI</span>
        </div>

        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">Dreams</a>
            <a href="#">Explore</a>
            <a href="#">Contact</a>
        </div>
    </nav>

    <!-- Hero Section -->

    <section class="hero">

        <div class="hero-content">

            <h1>
                Generate Your <span>Dream Universe</span>
            </h1>

            <p>
                Enter your imagination and let AI create a surreal dream world filled with fantasy, mystery, and futuristic beauty.
            </p>

            <div class="dream-box">

                <textarea id="dreamInput" placeholder="Describe your dream..."></textarea>

                <button onclick="generateDream()">
                    Generate Dream ✨
                </button>

                <div class="output" id="output">

                    <div class="dream-card" id="dreamText">

                    </div>

                </div>

            </div>

            <!-- Mood Buttons -->

            <div class="moods">

                <div class="mood-btn" onclick="changeMood('fantasy')">
                    Fantasy ✨
                </div>

                <div class="mood-btn" onclick="changeMood('ocean')">
                    Ocean 🌊
                </div>

                <div class="mood-btn" onclick="changeMood('space')">
                    Space 🚀
                </div>

                <div class="mood-btn" onclick="changeMood('cyber')">
                    Cyberpunk ⚡
                </div>

            </div>

        </div>

    </section>

    <!-- Footer -->

    <footer>
        AI Dream Generator © 2026 | Designed with imagination ✨
    </footer>

    <!-- JavaScript -->

    <script>

        function generateDream(){

            let input = document.getElementById("dreamInput").value;

            let output = document.getElementById("output");

            let dreamText = document.getElementById("dreamText");

            if(input.trim() === ""){

                dreamText.innerHTML = "Please enter a dream idea first ✨";

            }

            else{

                dreamText.innerHTML = `
                    <h2>Your Dream Vision 🌌</h2>
                    <br>

                    In a distant surreal universe, <b>${input}</b> appeared beneath glowing cosmic skies. 
                    Floating lights drifted through the air while mysterious whispers echoed across infinite dream landscapes.

                    A soft neon moon illuminated hidden pathways leading toward magical dimensions filled with wonder, emotion, and impossible beauty.

                    Your imagination transformed into a living dream realm where reality no longer existed.
                `;

            }

            output.style.display = "block";

        }

        function changeMood(mood){

            if(mood === "fantasy"){

                document.body.style.background =
                "linear-gradient(135deg,#1e1b4b,#312e81,#7c3aed)";
            }

            if(mood === "ocean"){

                document.body.style.background =
                "linear-gradient(135deg,#021b33,#064e3b,#0891b2)";
            }

            if(mood === "space"){

                document.body.style.background =
                "linear-gradient(135deg,#000000,#111827,#312e81)";
            }

            if(mood === "cyber"){

                document.body.style.background =
                "linear-gradient(135deg,#0f172a,#6d28d9,#ec4899)";
            }

        }

    </script>

</body>
</html>

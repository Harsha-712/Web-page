<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AI Dream Generator</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;
            overflow-x:hidden;
            background:linear-gradient(135deg,#050816,#12082b,#1f1147);
            color:white;
            position:relative;
        }

        

        .background{
            position:fixed;
            width:100%;
            height:100%;
            overflow:hidden;
            z-index:-1;
        }

        .circle{
            position:absolute;
            border-radius:50%;
            filter:blur(10px);
            opacity:0.5;
            animation:float 10s infinite ease-in-out;
        }

        .circle:nth-child(1){
            width:250px;
            height:250px;
            background:#8b5cf6;
            top:10%;
            left:5%;
        }

        .circle:nth-child(2){
            width:300px;
            height:300px;
            background:#ec4899;
            top:50%;
            right:10%;
            animation-delay:2s;
        }

        .circle:nth-child(3){
            width:180px;
            height:180px;
            background:#3b82f6;
            bottom:5%;
            left:40%;
            animation-delay:4s;
        }

        @keyframes float{
            0%{
                transform:translateY(0px);
            }
            50%{
                transform:translateY(-30px);
            }
            100%{
                transform:translateY(0px);
            }
        }

        

        nav{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:25px 10%;
        }

        .logo{
            font-size:28px;
            font-weight:700;
            color:#ffffff;
        }

        .logo span{
            color:#c084fc;
        }

        .nav-links{
            display:flex;
            gap:30px;
        }

        .nav-links a{
            color:white;
            text-decoration:none;
            transition:0.3s;
        }

        .nav-links a:hover{
            color:#c084fc;
        }

       

        .hero{
            min-height:90vh;
            display:flex;
            justify-content:center;
            align-items:center;
            text-align:center;
            padding:20px;
        }

        .hero-content{
            max-width:850px;
        }

        .hero h1{
            font-size:70px;
            line-height:1.1;
            margin-bottom:20px;
        }

        .hero h1 span{
    background:linear-gradient(to right,#c084fc,#ec4899,#60a5fa);

    -webkit-background-clip:text;
    background-clip:text;

    -webkit-text-fill-color:transparent;
}

        .hero p{
            font-size:20px;
            color:#d1d5db;
            margin-bottom:40px;
            line-height:1.7;
        }

        

        .dream-box{
            background:rgba(255,255,255,0.08);
            border:1px solid rgba(255,255,255,0.15);
            backdrop-filter:blur(15px);
            border-radius:25px;
            padding:30px;
            box-shadow:0 0 30px rgba(0,0,0,0.3);
        }

        textarea{
            width:100%;
            height:140px;
            border:none;
            outline:none;
            resize:none;
            border-radius:18px;
            padding:20px;
            font-size:18px;
            background:rgba(255,255,255,0.1);
            color:white;
            margin-bottom:25px;
        }

        textarea::placeholder{
            color:#d1d5db;
        }

        button{
            padding:15px 40px;
            border:none;
            border-radius:50px;
            background:linear-gradient(to right,#8b5cf6,#ec4899);
            color:white;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;
            font-weight:600;
        }

        button:hover{
            transform:scale(1.05);
            box-shadow:0 0 20px #c084fc;
        }

        

        .output{
            margin-top:40px;
            display:none;
            animation:fadeIn 1s ease;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(20px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        .dream-card{
            margin-top:20px;
            background:rgba(255,255,255,0.08);
            border:1px solid rgba(255,255,255,0.1);
            border-radius:20px;
            padding:30px;
            backdrop-filter:blur(12px);
            line-height:1.8;
            color:#f3f4f6;
            box-shadow:0 0 20px rgba(255,255,255,0.05);
        }

        

        .moods{
            margin-top:60px;
            display:flex;
            justify-content:center;
            gap:20px;
            flex-wrap:wrap;
        }

        .mood-btn{
            padding:12px 25px;
            border-radius:40px;
            background:rgba(255,255,255,0.08);
            border:1px solid rgba(255,255,255,0.1);
            cursor:pointer;
            transition:0.3s;
        }

        .mood-btn:hover{
            background:#8b5cf6;
            transform:translateY(-5px);
        }

        

        footer{
            text-align:center;
            padding:40px 20px;
            color:#d1d5db;
        }

        

        @media(max-width:768px){

            .hero h1{
                font-size:45px;
            }

            .hero p{
                font-size:17px;
            }

            nav{
                flex-direction:column;
                gap:20px;
            }

            .nav-links{
                gap:15px;
            }

        }

    </style>
</head>

<body>

   

    <div class="background">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>

    

    <nav>
        <div class="logo">
            Dream<span>AI</span>
        </div>

        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">Dreams</a>
            <a href="#">Explore</a>
            <a href="#">Contact</a>
        </div>
    </nav>

    

    <section class="hero">

        <div class="hero-content">

            <h1>
                Generate Your <span>Dream Universe</span>
            </h1>

            <p>
                Enter your imagination and let AI create a surreal dream world filled with fantasy, mystery, and futuristic beauty.
            </p>

            <div class="dream-box">

                <textarea id="dreamInput" placeholder="Describe your dream..."></textarea>

                <button onclick="generateDream()">
                    Generate Dream ✨
                </button>

                <div class="output" id="output">

                    <div class="dream-card" id="dreamText">

                    </div>

                </div>

            </div>

           

            <div class="moods">

                <div class="mood-btn" onclick="changeMood('fantasy')">
                    Fantasy ✨
                </div>

                <div class="mood-btn" onclick="changeMood('ocean')">
                    Ocean 🌊
                </div>

                <div class="mood-btn" onclick="changeMood('space')">
                    Space 🚀
                </div>

                <div class="mood-btn" onclick="changeMood('cyber')">
                    Cyberpunk ⚡
                </div>

            </div>

        </div>

    </section>


    <footer>
        AI Dream Generator © 2026 | Designed with imagination ✨
    </footer>

    

    <script>

    function generateDream(){

        let input = document.getElementById("dreamInput").value.toLowerCase();

        let output = document.getElementById("output");

        let dreamText = document.getElementById("dreamText");

        let body = document.body;

        let circles = document.querySelectorAll(".circle");

        if(input.trim() === ""){

            dreamText.innerHTML = "Please enter a dream idea first ✨";

            output.style.display = "block";

            return;
        }

        // Loading Animation

        output.style.display = "block";

        dreamText.innerHTML = `
            <h2>Generating Dream... 🌌</h2>
        `;

        setTimeout(() => {

            let story = "";

            // SPACE THEME

            if(
                input.includes("space") ||
                input.includes("galaxy") ||
                input.includes("moon") ||
                input.includes("stars")
            ){

                body.style.background =
                "linear-gradient(135deg,#020024,#090979,#000000)";

                circles[0].style.background = "#60a5fa";
                circles[1].style.background = "#8b5cf6";
                circles[2].style.background = "#c084fc";

                story = `
                    <h2>Cosmic Dream 🚀</h2>
                    <br>

                    You drifted through glowing galaxies where neon stars whispered ancient secrets.
                    Massive celestial gates opened before you while purple moons floated silently above cosmic oceans.

                    In the distance, forgotten civilizations shimmered beneath endless constellations.
                `;
            }

            // OCEAN THEME

            else if(
                input.includes("ocean") ||
                input.includes("water") ||
                input.includes("sea") ||
                input.includes("fish")
            ){

                body.style.background =
                "linear-gradient(135deg,#021B33,#064E3B,#0891B2)";

                circles[0].style.background = "#06b6d4";
                circles[1].style.background = "#0ea5e9";
                circles[2].style.background = "#14b8a6";

                story = `
                    <h2>Ocean Dream 🌊</h2>
                    <br>

                    Beneath glowing underwater skies, crystal jellyfish floated around ancient ruins hidden deep inside neon oceans.

                    Blue waves moved like liquid light while mysterious sea creatures guarded forgotten treasures.
                `;
            }

            // FOREST THEME

            else if(
                input.includes("forest") ||
                input.includes("tree") ||
                input.includes("nature") ||
                input.includes("jungle")
            ){

                body.style.background =
                "linear-gradient(135deg,#052e16,#166534,#14532d)";

                circles[0].style.background = "#22c55e";
                circles[1].style.background = "#4ade80";
                circles[2].style.background = "#86efac";

                story = `
                    <h2>Forest Dream 🌿</h2>
                    <br>

                    You wandered through magical forests where glowing butterflies danced beneath floating trees.

                    Ancient spirits whispered through emerald winds while golden rivers flowed through enchanted lands.
                `;
            }

            // CYBERPUNK THEME

            else if(
                input.includes("robot") ||
                input.includes("ai") ||
                input.includes("cyber") ||
                input.includes("future")
            ){

                body.style.background =
                "linear-gradient(135deg,#0f172a,#6d28d9,#ec4899)";

                circles[0].style.background = "#ec4899";
                circles[1].style.background = "#8b5cf6";
                circles[2].style.background = "#3b82f6";

                story = `
                    <h2>Cyber Dream ⚡</h2>
                    <br>

                    Neon skyscrapers pierced the dark futuristic sky while holograms flickered across endless digital streets.

                    AI entities moved silently through glowing cybernetic dimensions beyond human imagination.
                `;
            }

            // DEFAULT THEME

            else{

                body.style.background =
                "linear-gradient(135deg,#1e1b4b,#312e81,#7c3aed)";

                circles[0].style.background = "#8b5cf6";
                circles[1].style.background = "#ec4899";
                circles[2].style.background = "#60a5fa";

                story = `
                    <h2>Dream Vision ✨</h2>
                    <br>

                    In a surreal universe, <b>${input}</b> appeared beneath glowing skies filled with mystery and emotion.

                    Floating lights drifted through magical dimensions while reality slowly dissolved into pure imagination.
                `;
            }

            dreamText.innerHTML = story;

        }, 1500);

    }

</script>

</body>
</html>
